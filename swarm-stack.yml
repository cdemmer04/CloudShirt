version: "3.8"

services:

  eshopwebmvc:
    image: ${DOCKER_REGISTRY}:eshopwebmvc
    depends_on:
      - sqlserver
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
    ports:
      - "5601:80"

  eshoppublicapi:
    image: ${DOCKER_REGISTRY}:eshoppublicapi
    depends_on:
      - sqlserver
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker

  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      SA_PASSWORD: "@someThingComplicated1234"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    deploy:
      placement:
        constraints:
          - node.role == manager